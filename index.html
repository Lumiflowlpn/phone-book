<!DOCTYPE html>
<html lang="th">
<head>
    <!-- ... (ส่วน Head เหมือนเดิมทุกประการ) ... -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทำเนียบเบอร์โทรศัพท์ สกร.ลำพูน (V.Permanent)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

<!-- ... (ส่วน UI Body ตั้งแต่ id="auth-screen" จนถึง id="toast" เหมือนเดิม) ... -->

<script>
    // 🔗 ลิงก์ Web App URL ของคุณ (ฝังถาวร)
    const PERMANENT_SHEETS_URL = "https://script.google.com/macros/s/AKfycbxJ9L7PqubUpGuembTJD-tKg2Z0JEAZRcpcDYCtj2Qf0uHdfxepq1Uiq3FvWl9MHQan/exec";
    const SAFE_PASSCODE = "1234";

    let contacts = [];
    let isAdminMode = false;
    let isAllMasked = true;

    window.onload = function() {
        // 1. ตรวจสอบข้อมูลใน LocalStorage
        const savedContacts = localStorage.getItem('secure_directory_contacts');
        if (savedContacts) {
            contacts = JSON.parse(savedContacts);
        }

        // 2. ตั้งค่าลิงก์ในช่องแอดมินเป็นค่าถาวร
        const urlInput = document.getElementById('sheets-api-url');
        if (urlInput) {
            urlInput.value = localStorage.getItem('google_sheets_api_url') || PERMANENT_SHEETS_URL;
        }

        // 3. หากไม่มีข้อมูลเลย ให้ทำการ Auto-Sync ทันทีที่โหลดครั้งแรก
        if (contacts.length === 0) {
            console.log("No initial data, attempting auto-sync...");
            syncWithGoogleSheets(true); // โหมดเงียบ (silent sync)
        }

        // ตรวจสอบ Auth
        if (sessionStorage.getItem('is_authenticated') === 'true') {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            renderDirectory();
            populateDropdowns();
        }
    }

    async function syncWithGoogleSheets(isSilent = false) {
        const url = document.getElementById('sheets-api-url').value.trim() || PERMANENT_SHEETS_URL;
        if (!url) return;

        if (!isSilent) showToast("กำลังดึงข้อมูลเรียลไทม์...", "fa-spinner fa-spin", "text-indigo-400");
        
        try {
            localStorage.setItem('google_sheets_api_url', url);
            const response = await fetch(url);
            const data = await response.json();
            
            if (Array.isArray(data) && data.length > 0) {
                contacts = data;
                localStorage.setItem('secure_directory_contacts', JSON.stringify(contacts));
                populateDropdowns();
                renderDirectory();
                if (!isSilent) showToast("ซิงค์ข้อมูลสำเร็จแล้ว!", "fa-circle-check", "text-emerald-400");
            }
        } catch (error) {
            if (!isSilent) showToast("ไม่สามารถเชื่อมต่อฐานข้อมูลได้", "fa-circle-exclamation", "text-red-400");
        }
    }

    // ... (ส่วนฟังก์ชันอื่นๆ เช่น renderDirectory, checkPasscode, etc. นำมาจากโค้ดก่อนหน้าได้เลยค่ะ) ...
</script>
</body>
</html>
